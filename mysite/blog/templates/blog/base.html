<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Blog{% endblock %}</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: Georgia, serif;
            line-height: 1.6;
            color: #333;
            background-color: #f4f4f4;
        }

        header {
            background-color: #333;
            color: #fff;
            padding: 1rem 2rem;
        }

        header h1 a {
            color: #fff;
            text-decoration: none;
        }

        nav a {
            color: #ccc;
            text-decoration: none;
            margin-right: 1rem;
        }

        nav a:hover {
            color: #fff;
        }

        .container {
            max-width: 800px;
            margin: 2rem auto;
            padding: 0 1rem;
        }

        footer {
            text-align: center;
            padding: 1rem;
            color: #777;
            margin-top: 2rem;
        }
    </style>
    {% block extra_css %}{% endblock %}
</head>
<body>
    <header>
        <h1><a href="{% url 'home' %}">Blog</a></h1>
        <nav>
            <a href="{% url 'home' %}">Home</a>
            <a href="{% url 'post_create' %}">Novo Post</a>
        </nav>
    </header>

    <div class="container">
        {% block content %}{% endblock %}
    </div>

    <footer>
        <p>Blog Django</p>
    </footer>
</body>
</html>
